name: E2E (Playwright)

# Manual trigger only — the suite runs against a live deployment
# (defaults to production, see playwright.config.js) and exercises
# real auth/LLM flows, so it should not fire on every push.
on:
  workflow_dispatch:
    inputs:
      base_url:
        description: 'Target deployment URL'
        required: false
        default: 'https://www.dmforge.org'

jobs:
  e2e:
    name: Playwright e2e
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: yarn

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Install Playwright browsers
        run: yarn playwright install --with-deps chromium

      - name: Run e2e suite
        run: yarn test:e2e
        env:
          BASE_URL: ${{ github.event.inputs.base_url }}

      - name: Upload HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14
