name: CI

on:
  push:
    branches: [main, 'claude/**']
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: yarn install

      - name: Build
        run: yarn build
        env:
          # Public env vars are embedded at build time; use placeholder values
          # so Firebase client SDK initializes without error
          NEXT_PUBLIC_FIREBASE_API_KEY: placeholder
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: placeholder.firebaseapp.com
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: placeholder
          NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: placeholder.appspot.com
          NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: "000000000000"
          NEXT_PUBLIC_FIREBASE_APP_ID: "1:000000000000:web:placeholder"
          NEXT_PUBLIC_BASE_URL: https://dmforge.app
          # Server-side secrets (GEMINI_API_KEY, STRIPE_SECRET_KEY,
          # FIREBASE_SERVICE_ACCOUNT_JSON) are not needed at build time —
          # they are only read when API routes are invoked at request time.
