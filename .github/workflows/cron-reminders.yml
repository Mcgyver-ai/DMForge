name: Send due reminders

# Vercel Hobby allows only daily crons, so the 15-minute reminder cadence
# runs from here; vercel.json keeps a daily run as a backstop.
on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

jobs:
  send-reminders:
    runs-on: ubuntu-latest
    steps:
      - name: Call reminder endpoint
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -n "$CRON_SECRET" ]; then
            AUTH=(-H "Authorization: Bearer $CRON_SECRET")
          else
            AUTH=()
          fi
          code=$(curl -s -o /tmp/resp.json -w "%{http_code}" --max-time 60 \
            -X POST "${AUTH[@]}" "https://www.dmforge.org/api/cron/send-reminders")
          cat /tmp/resp.json
          [ "$code" = "200" ]
